<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بن انور - سلة المشتريات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/fontawesome.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-5">

                        <th class="text-main-red">السعر</th>

                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>فستان بناتي ربيعي</td>
                        <td>45</td>
                        <td>45</td>
                    </tr>
                    <tr class="fw-bold bg-light">
                        <td colspan="2">الإجمالي النهائي</td>
                        <td>45</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-grid mt-4">
            <button class="btn btn-main btn-lg">طرق الدفع <i class="fas fa-credit-card ms-2"></i></button>
        </div>
    </div>
